version: 2

builds:
  - id: apod-amd64
    main: ./cmd/apod
    binary: apod
    env:
      - CGO_ENABLED=1
      - CC=gcc
    goos:
      - linux
    goarch:
      - amd64
    ldflags:
      - -s -w -X github.com/aystro/apod/internal/engine.Version={{.Version}}

  - id: apod-arm64
    main: ./cmd/apod
    binary: apod
    env:
      - CGO_ENABLED=1
      - CC=aarch64-linux-gnu-gcc
    goos:
      - linux
    goarch:
      - arm64
    ldflags:
      - -s -w -X github.com/aystro/apod/internal/engine.Version={{.Version}}

archives:
  - formats:
      - tar.gz
    name_template: "apod_{{ .Os }}_{{ .Arch }}"

release:
  github:
    owner: aystro-com
    name: apod

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
