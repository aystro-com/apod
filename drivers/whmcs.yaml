name: whmcs
version: "1.0"
description: WHMCS billing panel (PHP + ionCube + MySQL)

parameters:
  php_version:
    type: string
    default: "8.1"
    options: ["8.1", "8.2"]

services:
  app:
    image: "webdevops/php-nginx:${php_version}"
    volumes:
      - "${site_root}:/app"
    ports:
      - "80"
    environment:
      WEB_DOCUMENT_ROOT: "/app"
      PHP_MEMORY_LIMIT: "512M"
      DB_HOST: "apod-${site_domain}-db"
      DB_PORT: "3306"
      DB_DATABASE: "${site_db_name}"
      DB_USERNAME: "${site_db_user}"
      DB_PASSWORD: "${site_db_pass}"

  db:
    image: "mysql:8.0"
    environment:
      MYSQL_DATABASE: "${site_db_name}"
      MYSQL_USER: "${site_db_user}"
      MYSQL_PASSWORD: "${site_db_pass}"
      MYSQL_RANDOM_ROOT_PASSWORD: "yes"
    volumes:
      - "${data_root}/mysql:/var/lib/mysql"

healthcheck:
  url: "http://localhost:80"
  interval: 10s
  timeout: 5s
  retries: 5

backup:
  paths:
    - "${site_root}"
  databases:
    - type: mysql
      service: db

setup:
  - name: "Wait for database"
    command: "sleep 10 && mysqladmin ping -h apod-${site_domain}-db --wait=30 2>/dev/null || sleep 5"
    service: app
  - name: "Install ionCube loader"
    command: "cd /tmp && curl -sL https://downloads.ioncube.com/loader_downloads/ioncube_loaders_lin_x86-64.tar.gz | tar xz && cp ioncube/ioncube_loader_lin_${php_version}.so $(php -i | grep extension_dir | head -1 | awk '{print $NF}')/ioncube.so && echo 'zend_extension=ioncube.so' > /usr/local/etc/php/conf.d/00-ioncube.ini && rm -rf ioncube"
    service: app
    user: root
  - name: "Fix permissions"
    command: "chmod -R 777 /app/storage /app/bootstrap/cache 2>/dev/null; chown -R application:application /app"
    service: app
    user: root
  - name: "Restart PHP-FPM"
    command: "supervisorctl restart php-fpm 2>/dev/null || kill -USR2 1 || true"
    service: app
    user: root
