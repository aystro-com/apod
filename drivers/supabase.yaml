name: supabase
version: "1.0"
description: Supabase (PostgreSQL + Auth + REST + Realtime + Storage + Studio)
type: compose

compose:
  repo: "https://github.com/supabase/supabase.git"
  branch: "master"
  path: "docker"
  proxy_service: "kong"
  proxy_port: "8000"
  shell_service: "db"
  env:
    # Core
    SITE_URL: "https://${site_domain}"
    API_EXTERNAL_URL: "https://${site_domain}"
    SUPABASE_PUBLIC_URL: "https://${site_domain}"
    STUDIO_DEFAULT_ORGANIZATION: "apod"
    STUDIO_DEFAULT_PROJECT: "${site_domain}"
    STUDIO_PORT: "3000"
    # Ports (internal only — Traefik handles external)
    KONG_HTTP_PORT: "8000"
    KONG_HTTPS_PORT: "8443"
    # Postgres
    POSTGRES_PASSWORD: "${site_db_pass}"
    POSTGRES_HOST: "db"
    POSTGRES_PORT: "5432"
    POSTGRES_DB: "postgres"
    # Auth
    JWT_SECRET: "${jwt_secret}"
    JWT_EXPIRY: "3600"
    ANON_KEY: "${anon_key}"
    SERVICE_ROLE_KEY: "${service_role_key}"
    # Dashboard
    DASHBOARD_USERNAME: "${dashboard_username}"
    DASHBOARD_PASSWORD: "${dashboard_password}"
    # Secrets
    SECRET_KEY_BASE: "${secret_key_base}"
    VAULT_ENC_KEY: "${vault_enc_key}"
    # Misc
    ADDITIONAL_REDIRECT_URLS: ""
    ENABLE_EMAIL_SIGNUP: "true"
    ENABLE_EMAIL_AUTOCONFIRM: "true"
    ENABLE_ANONYMOUS_USERS: "false"
    ENABLE_PHONE_SIGNUP: "false"
    ENABLE_PHONE_AUTOCONFIRM: "false"
    # SMTP (disabled by default — configure for production)
    SMTP_ADMIN_EMAIL: "admin@${site_domain}"
    SMTP_HOST: "supabase-mail"
    SMTP_PORT: "2500"
    SMTP_USER: ""
    SMTP_PASS: ""
    SMTP_SENDER_NAME: "Supabase"
    # Storage
    S3_PROTOCOL_ACCESS_KEY_ID: "${s3_access_key_id}"
    S3_PROTOCOL_ACCESS_KEY_SECRET: "${s3_access_key_secret}"
    STORAGE_FILE_SIZE_LIMIT: "52428800"
    # Pooler
    POOLER_PROXY_PORT_TRANSACTION: "6543"
    POOLER_DEFAULT_POOL_SIZE: "20"
    POOLER_MAX_CLIENT_CONN: "100"
    POOLER_TENANT_ID: "default-tenant"
    # Analytics
    LOGFLARE_API_KEY: "${logflare_private_token}"
    LOGFLARE_LOGGER_BACKEND_API_KEY: "${logflare_private_token}"
    LOGFLARE_PUBLIC_ACCESS_TOKEN: "${logflare_public_token}"
    # Meta
    PG_META_CRYPTO_KEY: "${pg_meta_crypto_key}"
    # Docker socket (needed by some services)
    DOCKER_SOCKET_LOCATION: "/var/run/docker.sock"
    # Pooler
    POOLER_DB_POOL_SIZE: "20"

parameters:
  dashboard_username:
    type: string
    default: "supabase"

backup:
  databases:
    - type: postgres
      service: db
