name: php
version: "1.0"
description: PHP + Nginx + MySQL (ready environment, no git required)

parameters:
  php_version:
    type: string
    default: "8.4"
    options: ["8.1", "8.2", "8.3", "8.4"]

services:
  app:
    image: "webdevops/php-nginx-dev:${php_version}"
    volumes:
      - "${site_root}:/app"
    ports:
      - "80"
    environment:
      WEB_DOCUMENT_ROOT: "/app/public"
      PHP_MEMORY_LIMIT: "512M"
      DB_HOST: "apod-${site_domain}-db"
      DB_PORT: "3306"
      DB_DATABASE: "${site_db_name}"
      DB_USERNAME: "${site_db_user}"
      DB_PASSWORD: "${site_db_pass}"

  db:
    image: "mysql:8.0"
    environment:
      MYSQL_DATABASE: "${site_db_name}"
      MYSQL_USER: "${site_db_user}"
      MYSQL_PASSWORD: "${site_db_pass}"
      MYSQL_RANDOM_ROOT_PASSWORD: "yes"
    volumes:
      - "${data_root}/mysql:/var/lib/mysql"

healthcheck:
  url: "http://localhost:80"
  interval: 10s
  timeout: 5s
  retries: 3

backup:
  paths:
    - "${site_root}"
  databases:
    - type: mysql
      service: db

setup:
  - name: "Wait for database"
    command: "sleep 10 && mysqladmin ping -h apod-${site_domain}-db --wait=30 2>/dev/null || sleep 5"
    service: app
  - name: "Create default index"
    command: "mkdir -p /app/public && if [ ! -f /app/public/index.php ]; then echo '<?php phpinfo();' > /app/public/index.php; fi"
    service: app
