name: laravel
version: "1.0"
description: Laravel application with Nginx, PHP, Composer, Node

parameters:
  php_version:
    type: string
    default: "8.4"
    options: ["8.1", "8.2", "8.3", "8.4"]

services:
  app:
    image: "webdevops/php-nginx-dev:${php_version}"
    volumes:
      - "${site_root}:/app"
    ports:
      - "80"
    environment:
      WEB_DOCUMENT_ROOT: "/app/public"
      PHP_MEMORY_LIMIT: "512M"
      DB_CONNECTION: "mysql"
      DB_HOST: "apod-${site_domain}-db"
      DB_PORT: "3306"
      DB_DATABASE: "${site_db_name}"
      DB_USERNAME: "${site_db_user}"
      DB_PASSWORD: "${site_db_pass}"
      APP_URL: "https://${site_domain}"
      APP_ENV: "production"

  db:
    image: "mysql:8.0"
    environment:
      MYSQL_DATABASE: "${site_db_name}"
      MYSQL_USER: "${site_db_user}"
      MYSQL_PASSWORD: "${site_db_pass}"
      MYSQL_RANDOM_ROOT_PASSWORD: "yes"
    volumes:
      - "${data_root}/mysql:/var/lib/mysql"

deploy:
  before_deploy:
    - "cd /app && composer install --no-dev --optimize-autoloader --no-interaction"
    - "cd /app && if [ -f package.json ]; then npm install && npm run build; fi"
  after_deploy:
    - "cd /app && php artisan migrate --force"
    - "cd /app && php artisan storage:link 2>/dev/null || true"
    - "cd /app && php artisan optimize 2>/dev/null || true"

healthcheck:
  url: "http://localhost:80"
  interval: 10s
  timeout: 5s
  retries: 3

backup:
  paths:
    - "${site_root}"
  databases:
    - type: mysql
      service: db

setup:
  - name: "Wait for database"
    command: "sleep 10 && mysqladmin ping -h apod-${site_domain}-db --wait=30 2>/dev/null || sleep 5"
    service: app
  - name: "Generate .env if missing"
    command: "cd /app && if [ ! -f .env ]; then cp .env.example .env 2>/dev/null || touch .env; fi"
    service: app
  - name: "Generate app key if empty"
    command: "cd /app && if ! grep -q 'APP_KEY=base64' .env; then php artisan key:generate --force; fi"
    service: app
  - name: "Install dependencies"
    command: "cd /app && composer install --no-dev --optimize-autoloader --no-interaction 2>/dev/null || true"
    service: app
  - name: "Run migrations"
    command: "cd /app && php artisan migrate --force 2>/dev/null || true"
    service: app
  - name: "Fix permissions"
    command: "cd /app && chmod -R 777 storage bootstrap/cache 2>/dev/null || true"
    service: app
  - name: "Clear config cache"
    command: "cd /app && php artisan config:clear && php artisan storage:link 2>/dev/null || true"
    service: app
