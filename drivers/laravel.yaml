name: laravel
version: "1.0"
description: Laravel application with Nginx, PHP-FPM and MySQL

parameters:
  php_version:
    type: string
    default: "8.3"
    options: ["8.1", "8.2", "8.3", "8.4"]

services:
  app:
    image: "webdevops/php-nginx:${php_version}"
    volumes:
      - "${site_root}:/app"
    ports:
      - "80"
    environment:
      WEB_DOCUMENT_ROOT: "/app/public"
      DB_HOST: "apod-${site_domain}-db"
      DB_DATABASE: "${site_db_name}"
      DB_USERNAME: "${site_db_user}"
      DB_PASSWORD: "${site_db_pass}"

  db:
    image: "mysql:8.0"
    environment:
      MYSQL_DATABASE: "${site_db_name}"
      MYSQL_USER: "${site_db_user}"
      MYSQL_PASSWORD: "${site_db_pass}"
      MYSQL_RANDOM_ROOT_PASSWORD: "yes"
    volumes:
      - "${data_root}/mysql:/var/lib/mysql"

deploy:
  before_deploy:
    - "composer install --no-dev --optimize-autoloader"
    - "npm install && npm run build"
  after_deploy:
    - "php artisan migrate --force"
    - "php artisan config:cache"
    - "php artisan route:cache"
    - "php artisan view:cache"

healthcheck:
  url: "http://localhost:80"
  interval: 10s
  timeout: 5s
  retries: 3

backup:
  paths:
    - "${site_root}"
  databases:
    - type: mysql
      service: db

setup:
  - name: "Wait for database"
    command: "mysqladmin ping -h apod-${site_domain}-db --wait=30"
    service: app
