name: unifi
version: "1.0"
description: UniFi Network Application with MongoDB

parameters:
  unifi_version:
    type: string
    default: "latest"
    options: ["latest"]

services:
  app:
    image: "jacobalberty/unifi:${unifi_version}"
    volumes:
      - "${data_root}/unifi:/unifi"
    ports:
      - "8443"
      - "8080"
      - "3478/udp"
      - "10001/udp"
    environment:
      DB_URI: "mongodb://apod-${site_domain}-db:27017/${site_db_name}"
      STATDB_URI: "mongodb://apod-${site_domain}-db:27017/${site_db_name}_stat"
      DB_NAME: "${site_db_name}"
      TZ: "UTC"

  db:
    image: "mongo:4.4"
    volumes:
      - "${data_root}/mongodb:/data/db"

healthcheck:
  url: "https://localhost:8443"
  interval: 30s
  timeout: 10s
  retries: 5

backup:
  paths:
    - "${data_root}/unifi"
  databases:
    - type: mongo
      service: db

setup:
  - name: "Wait for MongoDB"
    command: "sleep 10"
    service: db
  - name: "Wait for UniFi startup"
    command: "sleep 30"
    service: app
